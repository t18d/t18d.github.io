title: Open Source by Tonkünstler-on-the-Bund
description: The open-source arm of TKB
logo: android-chrome-192x192.png
locale: en_GB
remote_theme: pages-themes/primer
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-github-metadata   
  - jekyll-seo-tag                
  - jekyll-seo-tag                
  - jekyll-sitemap                
  - jekyll-coffeescript                
  - jekyll-commonmark-ghpages                
  - jekyll-gist                
  - jekyll-github-metadata                
  - jekyll-paginate                
  - jekyll-relative-links                
  - jekyll-optional-front-matter                
  - jekyll-readme-index                
  - jekyll-default-layout                
  - jekyll-titles-from-headings
incremental: true
defaults:
  -
    scope:
      path:            "assets/*.pdf"
    values:
      sitemap:         false

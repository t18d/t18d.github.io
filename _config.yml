title: Open Source by Tonkünstler-on-the-Bund
description: The open-source arm of TKB
logo: android-chrome-192x192.png
locale: en_GB
repository: t18d/t18d.github.io
remote_theme: pages-themes/primer
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-github-metadata
  - kramdown-parser-gfm
incremental: true
defaults:
  -
    scope:
      path:            "assets/*.pdf"
    values:
      sitemap:         false
